name: SEO health

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 10 * * 1'
  workflow_dispatch:

jobs:
  build-and-seo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Production SEO smoke tests
        env:
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          PAGESPEED_API_KEY: ${{ secrets.PAGESPEED_API_KEY }}
        run: npm run seo-health
